<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Portal Curupira WebRadio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<h1>🎙 Portal Curupira WebRadio</h1>

<div class="status" id="status">
PRONTO
</div>

<div class="track-box">
<div class="track-title" id="trackTitle">
Nenhuma música carregada
</div>
</div>

<audio id="player"></audio>

<div class="controls">

<button onclick="togglePlay()">
▶ PLAY / ⏸ PAUSE
</button>

<button onclick="nextMusic()">
⏭ PRÓXIMA
</button>

<button onclick="toggleMic()">
🎤 MICROFONE
</button>

</div>

<div class="volume-box">

<h3>🎵 Volume Música</h3>

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
id="musicVolume">

<h3>🎤 Volume Microfone</h3>

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
id="micVolume">

</div>

</div>

<script src="app.js"></script>

</body>
</html>
